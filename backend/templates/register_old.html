<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ APP_NAME }} - Register</title>
  <!-- Bootstrap 오프라인 -->
  <link rel="stylesheet" href="/static/bootstrap/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

  <div class="card shadow-lg rounded-3 border-0 w-100" style="max-width: 520px;">
    <div class="card-body p-4 p-md-5">
      <!-- 로고 -->
      <div class="text-center mb-4">
        <h1 class="h3 fw-bold text-dark">{{ APP_NAME }}</h1>
        <p class="text-muted">Create a new account</p>
      </div>

      <!-- 회원가입 Form -->
      <form id="registerForm" method="post" action="/auth/register">
        <!-- Store ID -->
        <div class="mb-3">
          <label for="store_id" class="form-label">Store ID</label>
          <input type="text" class="form-control" id="store_id" name="store_id" required>
        </div>
        <!-- Store Password -->
        <div class="mb-3">
          <label for="store_pw" class="form-label">Store Password</label>
          <input type="password" class="form-control" id="store_pw" name="store_pw" required>
        </div>

        <!-- Full Name -->
        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="first_name" class="form-label">First Name</label>
            <input type="text" class="form-control" id="first_name" name="first_name" required>
          </div>
          <div class="col-md-6 mb-3">
            <label for="last_name" class="form-label">Last Name</label>
            <input type="text" class="form-control" id="last_name" name="last_name" required>
          </div>
        </div>

        <!-- Phone -->
        <div class="mb-3">
          <label for="phone" class="form-label">Phone</label>
          <input type="text" class="form-control" id="phone" name="phone" maxlength="15" required>
          <div id="phone_error" class="invalid-feedback d-none">
            Phone must contain only numbers
          </div>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" name="email" required>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" name="password" required>
        </div>

        <!-- Confirm Password -->
        <div class="mb-3">
          <label for="confirm_password" class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
          <div id="pw_error" class="invalid-feedback d-none">
            Passwords do not match
          </div>
        </div>

        <!-- Submit Button -->
        <div class="d-grid mb-3">
          <button type="submit" id="registerBtn" class="btn btn-dark fw-semibold">
            Register
          </button>
        </div>
      </form>

      <!-- Links -->
      <div class="text-center small mt-4">
        <p>
          Already have an account?
          <a href="/auth/login" class="fw-semibold text-decoration-none">Sign In</a>
        </p>
        <p>
          <a href="/" class="text-decoration-none">⬅ Back to Home</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="/static/bootstrap/js/bootstrap.bundle.min.js"></script>

  <!-- ✅ Validation Script -->
  <script>
    const pw = document.getElementById("password");
    const confirmPw = document.getElementById("confirm_password");
    const pwError = document.getElementById("pw_error");
    const phone = document.getElementById("phone");
    const phoneError = document.getElementById("phone_error");
    const registerBtn = document.getElementById("registerBtn");

    function validatePassword() {
      if (pw.value && confirmPw.value && pw.value !== confirmPw.value) {
        confirmPw.classList.add("is-invalid");
        pwError.classList.remove("d-none");
        registerBtn.disabled = true;
      } else {
        confirmPw.classList.remove("is-invalid");
        pwError.classList.add("d-none");
        registerBtn.disabled = false;
      }
    }

    function validatePhone() {
      const onlyNumbers = /^\d+$/;
      if (phone.value && !onlyNumbers.test(phone.value)) {
        phone.classList.add("is-invalid");
        phoneError.classList.remove("d-none");
        registerBtn.disabled = true;
      } else {
        phone.classList.remove("is-invalid");
        phoneError.classList.add("d-none");
        registerBtn.disabled = false;
      }
    }

    pw.addEventListener("input", validatePassword);
    confirmPw.addEventListener("input", validatePassword);
    phone.addEventListener("input", validatePhone);
  </script>

</body>
</html>
